<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>バネ型数計算</title>
<style>
body{font-family:sans-serif;max-width:420px;margin:20px auto;padding:16px}
input,button{font-size:18px;padding:10px;width:100%;margin:8px 0}
.card{border:1px solid #ccc;border-radius:8px;padding:12px;margin-top:12px}
.ok{color:green}.ng{color:red}
</style></head><body>
<h2>バネ型数計算</h2>
<input id="n" type="number" placeholder="バネ数を入力">
<button onclick="calc()">計算</button>
<div class="card" id="out"></div>
<script>
function up(x){return Math.ceil(x);}
function calc(){
 let n=Number(document.getElementById('n').value);
 if(!n){out.innerHTML="バネ数を入力してください";return;}
 let t4=up(n/48), t3=up(n/36);
 let h=(v)=>v<=85?'<span class="ok">○ 85型以内</span>':'<span class="ng">× '+(v-85)+'型超過</span>';
 out.innerHTML=
 `<b>4回加工</b><br>必要型数: ${t4}型<br>${h(t4)}<hr>
 <b>3回加工</b><br>必要型数: ${t3}型<br>${h(t3)}`;
}
</script></body></html>
